<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keyboard Master</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #1e1e1e;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    transition: background 0.3s, color 0.3s;
  }

  body.light {
    background: #f5f5f5;
    color: #1e1e1e;
  }

  .container {
    width: 100%;
    max-width: 860px;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    position: relative;
  }

  h1 {
    text-align: center;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .theme-btn {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: #2d2d2d;
    color: #fff;
    border: 1px solid #555;
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.2s;
    z-index: 100;
  }

  body.light .theme-btn {
    background: #fff;
    color: #1e1e1e;
    border-color: #ccc;
  }

  .theme-btn:hover { background: #444; }
  body.light .theme-btn:hover { background: #eee; }

  .text-display {
    font-family: 'Consolas', 'Courier New', monospace;
    font-size: 1.1rem;
    line-height: 1.8;
    min-height: 120px;
    max-height: 200px;
    overflow-y: auto;
    padding: 1rem;
    border-radius: 8px;
    background: #2d2d2d;
    border: 1px solid #444;
    word-break: break-word;
  }

  body.light .text-display {
    background: #fff;
    border-color: #ddd;
  }

  .text-display .line {
    white-space: nowrap;
    overflow: hidden;
  }

  .placeholder {
    text-align: center;
    font-family: 'Consolas', monospace;
    font-size: 1rem;
    color: #aaa;
    padding: 1rem 0;
    line-height: 1.8;
  }

  body.light .placeholder { color: #666; }

  .stats-row {
    display: flex;
    gap: 2rem;
    justify-content: center;
    font-size: 0.95rem;
    color: #aaa;
  }

  body.light .stats-row { color: #666; }

  .stats-row span { font-weight: 600; color: #fff; }
  body.light .stats-row span { color: #1e1e1e; }

  input[type="text"] {
    width: 100%;
    font-family: 'Consolas', monospace;
    font-size: 1rem;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid #555;
    background: #2d2d2d;
    color: #fff;
    outline: none;
    transition: border 0.2s;
  }

  body.light input[type="text"] {
    background: #fff;
    color: #1e1e1e;
    border-color: #ccc;
  }

  input[type="text"]:focus { border-color: #90EE90; }
  input[type="text"]:disabled { opacity: 0.5; cursor: not-allowed; }

  .input-label {
    font-size: 0.9rem;
    color: #aaa;
    margin-bottom: 4px;
  }

  body.light .input-label { color: #666; }

  .controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
  }

  .start-btn {
    background: #90EE90;
    color: #1a1a1a;
    border: none;
    border-radius: 8px;
    padding: 10px 32px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    width: 267px;
    transition: background 0.2s, transform 0.1s;
  }

  .start-btn:hover { background: #72D672; }
  .start-btn:active { transform: scale(0.98); background: #58C058; }
  .start-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  select {
    width: 267px;
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid #555;
    background: #2d2d2d;
    color: #fff;
    font-size: 0.95rem;
    cursor: pointer;
    outline: none;
  }

  body.light select {
    background: #fff;
    color: #1e1e1e;
    border-color: #ccc;
  }

  .char-correct { color: #3D943D; }
  .char-error-corrected { color: #FFB300; }
  .char-wrong { color: #FF0000; }
  .char-wrong-space { color: #FF0000; background: #FFCCCC; }
  .char-cursor { text-decoration: underline; }
  .char-untyped { color: #808080; }
  body.light .char-untyped { color: #aaaaaa; }

  .line.dim { opacity: 0.4; }
  .line.bright { opacity: 1; }

  .results-stats {
    display: flex;
    flex-wrap: wrap;
    gap: 1rem;
    justify-content: center;
    margin-top: 0.5rem;
    font-size: 0.95rem;
  }

  .results-stats .stat {
    padding: 4px 12px;
    border-radius: 6px;
    font-weight: 600;
  }

  .stat-time { background: #2a2a2a; color: #ddd; }
  body.light .stat-time { background: #e8e8e8; color: #333; }
  .stat-wpm { background: #2a2a2a; color: #ddd; }
  body.light .stat-wpm { background: #e8e8e8; color: #333; }
  .stat-errors { background: #3a1a1a; color: #FF6B6B; }
  .stat-corrections { background: #3a2a00; color: #FFB300; }
  .stat-accuracy { background: #1a3a1a; color: #3D943D; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }
  body.light ::-webkit-scrollbar-thumb { background: #ccc; }
</style>
</head>
<body>
<div class="container">
  <h1 id="title">Main Menu</h1>

  <div id="placeholder" class="placeholder">Click Start to begin...</div>

  <div id="text-display" class="text-display" style="display:none"></div>

  <div id="stats-row" class="stats-row" style="display:none">
    <div>Time: <span id="timer">0s</span></div>
    <div>WPM: <span id="wpm">—</span></div>
  </div>

  <div id="results-stats" class="results-stats" style="display:none"></div>

  <div id="input-section" style="display:none">
    <div class="input-label">Start typing here:</div>
    <input type="text" id="user-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" disabled />
  </div>

  <div class="controls">
    <button class="start-btn" id="start-btn" disabled>Start New Practice</button>
    <select id="difficulty">
      <option value="easy">Easy</option>
      <option value="medium">Medium</option>
      <option value="hard">Hard</option>
    </select>
  </div>
</div>

<button class="theme-btn" id="theme-btn">☀️ Light Mode</button>

<script>
const SAMPLE_TEXTS = {
  easy: [
    "The quick brown fox jumps over the lazy dog.",
    "Practice makes perfect, so keep on typing every day.",
    "Python is a great language for building desktop apps.",
  ],
  medium: [
    "The quick brown fox jumps over the lazy dog. A wizard's job is to vex chumps quickly in fog.",
    "Practice makes perfect, so keep on typing every day. The more you type, the faster you will become.",
    "Python is a great language for building desktop apps. It is simple, powerful, and widely used.",
  ],
  hard: [
    "The quick brown fox jumps over the lazy dog. A wizard's job is to vex chumps quickly in fog. Pack my box with five dozen liquor jugs. How vexingly quick daft zebras jump over the fence today.",
    "Practice makes perfect, so keep on typing every day. The more you type, the faster you will become. Consistency is the key to mastering any skill. Every expert was once a beginner who refused to give up and kept pushing forward.",
    "Python is a great language for building desktop apps. It is simple, powerful, and widely used. Many developers choose Python for its clean and readable syntax. The language encourages good habits and makes complex programming tasks feel straightforward and enjoyable.",
    "The sun slowly set behind the mountains as the tired traveler finally reached the small village. He had walked for many miles through forests and fields, carrying nothing but a worn leather bag and a faded map. The villagers welcomed him warmly with food and shelter.",
    "Technology has changed the way people communicate, work, and live their daily lives. From smartphones to artificial intelligence, the pace of innovation shows no signs of slowing down. Learning to adapt and grow with these changes is one of the most valuable skills anyone can develop.",
  ],
};

let targetText = "";
let hadError = new Set();
let elapsed = 0;
let timerInterval = null;
let darkMode = true;
let completed = false;
let soundBuffer = null;

const titleEl = document.getElementById("title");
const placeholderEl = document.getElementById("placeholder");
const textDisplayEl = document.getElementById("text-display");
const statsRowEl = document.getElementById("stats-row");
const resultsStatsEl = document.getElementById("results-stats");
const inputSection = document.getElementById("input-section");
const userInput = document.getElementById("user-input");
const startBtn = document.getElementById("start-btn");
const difficultyEl = document.getElementById("difficulty");
const timerEl = document.getElementById("timer");
const wpmEl = document.getElementById("wpm");
const themeBtn = document.getElementById("theme-btn");

async function loadSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const sampleRate = ctx.sampleRate;
    const duration = 0.06;
    const buffer = ctx.createBuffer(1, sampleRate * duration, sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      const t = i / sampleRate;
      data[i] = (Math.random() * 2 - 1) * Math.exp(-t * 60) * 0.4;
    }
    soundBuffer = { ctx, buffer };
    startBtn.disabled = false;
  } catch (e) {
    startBtn.disabled = false;
  }
}

function playSound() {
  if (!soundBuffer) return;
  try {
    const src = soundBuffer.ctx.createBufferSource();
    src.buffer = soundBuffer.buffer;
    src.connect(soundBuffer.ctx.destination);
    src.start();
  } catch (e) {}
}

function buildLines(typed) {
  const containerWidth = textDisplayEl.clientWidth - 32;
  const canvas = document.createElement("canvas");
  const ctx2 = canvas.getContext("2d");
  ctx2.font = "17.6px Consolas, 'Courier New', monospace";

  const spans = [];
  for (let i = 0; i < targetText.length; i++) {
    const char = targetText[i];
    if (i < typed.length) {
      if (typed[i] === char) {
        spans.push({ char, kind: hadError.has(i) ? "corrected" : "correct" });
      } else {
        spans.push({ char, kind: "wrong" });
      }
    } else if (i === typed.length) {
      spans.push({ char, kind: "cursor" });
    } else {
      spans.push({ char, kind: "untyped" });
    }
  }

  const lines = [];
  let currentLine = [];
  let currentPlain = "";
  let currentWord = [];
  let currentWordPlain = "";

  for (const span of spans) {
    currentWord.push(span);
    currentWordPlain += span.char;

    if (span.char === " ") {
      const test = currentPlain + currentWordPlain;
      if (ctx2.measureText(test).width > containerWidth && currentPlain) {
        lines.push(currentLine);
        currentLine = [...currentWord];
        currentPlain = currentWordPlain;
      } else {
        currentLine.push(...currentWord);
        currentPlain += currentWordPlain;
      }
      currentWord = [];
      currentWordPlain = "";
    }
  }

  if (currentWord.length) {
    const test = currentPlain + currentWordPlain;
    if (ctx2.measureText(test).width > containerWidth && currentPlain) {
      lines.push(currentLine);
      currentLine = [...currentWord];
    } else {
      currentLine.push(...currentWord);
    }
  }
  if (currentLine.length) lines.push(currentLine);

  return lines;
}

function getCurrentLine(lines, typedLen) {
  let cumulative = 0;
  for (let i = 0; i < lines.length; i++) {
    cumulative += lines[i].length;
    if (typedLen <= cumulative) return i;
  }
  return lines.length - 1;
}

function spanToHtml(span, opacity) {
  const display = span.char === " " ? "&nbsp;" : span.char.replace(/</g, "&lt;").replace(/>/g, "&gt;");
  const alpha = Math.round(opacity * 255).toString(16).padStart(2, "0");

  if (span.kind === "cursor") {
    return `<span style="text-decoration:underline">${display}</span>`;
  } else if (span.kind === "correct") {
    return `<span style="color:#3D943D${opacity < 1 ? alpha : ""}">${display}</span>`;
  } else if (span.kind === "corrected") {
    return `<span style="color:#FFB300${opacity < 1 ? alpha : ""}">${display}</span>`;
  } else if (span.kind === "wrong") {
    const bg = span.char === " " ? ' style="color:#FF0000;background:#FFCCCC"' : ` style="color:#FF0000"`;
    return `<span${bg}>${display}</span>`;
  } else {
    const color = darkMode ? "#808080" : "#aaaaaa";
    return `<span style="color:${color}">${display}</span>`;
  }
}

function updateHighlight(typed) {
  const lines = buildLines(typed);
  const currentLine = getCurrentLine(lines, typed.length);

  let html = "";
  for (let i = 0; i < lines.length; i++) {
    const opacity = (completed || i === currentLine) ? 1.0 : 0.4;
    let lineHtml = "";
    for (const span of lines[i]) {
      lineHtml += spanToHtml(span, opacity);
    }
    html += `<div class="line ${opacity === 1 ? "bright" : "dim"}">${lineHtml}</div>`;
  }
  textDisplayEl.innerHTML = html;

  if (!completed) {
    const lineEls = textDisplayEl.querySelectorAll(".line");
    if (lineEls[currentLine]) {
      lineEls[currentLine].scrollIntoView({ block: "nearest" });
    }
  }
}

function startPractice() {
  titleEl.textContent = "Keyboard Master";
  const tier = difficultyEl.value;
  const texts = SAMPLE_TEXTS[tier];
  targetText = texts[Math.floor(Math.random() * texts.length)];

  hadError = new Set();
  elapsed = 0;
  completed = false;

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    elapsed++;
    timerEl.textContent = elapsed + "s";
    const typed = userInput.value;
    if (typed.length > 0) {
      const wpm = Math.floor((typed.length / 5) / (elapsed / 60));
      wpmEl.textContent = wpm;
    }
  }, 1000);

  userInput.value = "";
  userInput.disabled = false;
  userInput.style.display = "block";

  placeholderEl.style.display = "none";
  textDisplayEl.style.display = "block";
  statsRowEl.style.display = "flex";
  resultsStatsEl.style.display = "none";
  inputSection.style.display = "block";
  timerEl.textContent = "0s";
  wpmEl.textContent = "—";

  updateHighlight("");
  userInput.focus();
}

function onComplete(typed) {
  clearInterval(timerInterval);
  completed = true;
  updateHighlight(typed);

  userInput.disabled = true;
  inputSection.style.display = "none";
  statsRowEl.style.display = "none";
  titleEl.textContent = "Results";

  const errors = [...typed.slice(0, targetText.length)].filter((c, i) => c !== targetText[i]).length;
  const corrections = hadError.size - errors;
  const accuracy = Math.max(0, Math.round((1 - hadError.size / targetText.length) * 1000) / 10);
  const wpm = wpmEl.textContent;

  resultsStatsEl.innerHTML = `
    <div class="stat stat-time">⏱ ${elapsed}s</div>
    <div class="stat stat-wpm">💨 WPM: ${wpm}</div>
    <div class="stat stat-errors">✗ Errors: ${errors}</div>
    <div class="stat stat-corrections">~ Corrections: ${corrections}</div>
    <div class="stat stat-accuracy">✓ Accuracy: ${accuracy}%</div>
  `;
  resultsStatsEl.style.display = "flex";
  placeholderEl.style.display = "none";
}

userInput.addEventListener("input", () => {
  playSound();
  const typed = userInput.value;

  for (let i = 0; i < typed.length; i++) {
    if (i < targetText.length && typed[i] !== targetText[i]) {
      hadError.add(i);
    }
  }

  updateHighlight(typed);

  if (typed.length >= targetText.length) {
    onComplete(typed);
  }
});

startBtn.addEventListener("click", startPractice);

themeBtn.addEventListener("click", () => {
  darkMode = !darkMode;
  document.body.classList.toggle("light", !darkMode);
  themeBtn.textContent = darkMode ? "☀️ Light Mode" : "🌙 Dark Mode";
  if (targetText) updateHighlight(userInput.value);
});

window.addEventListener("resize", () => {
  if (targetText) updateHighlight(userInput.value);
});

loadSound();
</script>
</body>
</html>
